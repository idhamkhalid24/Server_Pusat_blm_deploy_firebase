<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Rocky Hijab — Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Nunito+Sans:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="app">
  <div id="loading">
    <div class="loader-ring"></div>
    <p style="font-size:12px;font-weight:700;color:var(--text-soft);letter-spacing:.07em">Memuat...</p>
  </div>
  <div id="toast">Toast</div>

  <div id="transaction-modal" class="modal-wrap">
    <div class="modal-sheet">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px">
        <div>
          <h3 style="font-size:16px;font-weight:800;letter-spacing:-.02em">Transaksi</h3>
        </div>
        <button onclick="closeTransactionModal()" class="btn btn-glass" style="width:36px;height:36px;padding:0;border-radius:12px"><i class="fas fa-xmark"></i></button>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 15px">
          <p class="label-xs">Catatan</p>
          <input id="modal-pos-note" type="text" placeholder="Tulis manual..." autocomplete="off" class="g-input" style="background:none;border:none;padding:4px 0 2px;font-size:15px;line-height:1.45;min-height:30px;display:block">
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 15px">
          <p class="label-xs">Nominal</p>
          <input id="modal-pos-amount" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="0" autocomplete="off" class="amount-display" data-numeric="0">
        </div>
      </div>
      <div id="modal-pos-status" style="margin:14px 0 0"></div>
      <div style="display:flex;gap:10px;margin-top:16px">
        <button onclick="closeTransactionModal()" class="btn btn-glass" style="flex:1;padding:12px;font-size:13px">Batal</button>
        <button onclick="prepareTransactionPaymentFromModal()" class="btn btn-primary" style="flex:1;padding:12px;font-size:13px">Simpan</button>
      </div>
    </div>
  </div>


  <div id="transaction-payment-modal" class="modal-wrap">
    <div class="modal-sheet">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px">
        <div>
          <h3 style="font-size:16px;font-weight:800;letter-spacing:-.02em">Pilih Pembayaran</h3>
          <p style="font-size:11.5px;color:var(--text-soft);margin-top:3px">Cash atau QRIS / Transfer</p>
        </div>
        <button onclick="closeTransactionPaymentModal()" class="btn btn-glass" style="width:36px;height:36px;padding:0;border-radius:12px"><i class="fas fa-xmark"></i></button>
      </div>
      <div id="transaction-payment-summary" style="background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:12px 13px;margin-bottom:12px"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <button id="transaction-pay-cash" data-transaction-payment-choice="cash" onpointerdown="confirmTransactionPayment('cash',this,event)" ontouchstart="confirmTransactionPayment('cash',this,event)" onclick="confirmTransactionPayment('cash',this,event)" class="btn btn-success" style="min-height:56px;font-size:13px"><i class="fas fa-money-bill-wave"></i> Cash</button>
        <button id="transaction-pay-qris" data-transaction-payment-choice="qris_transfer" onpointerdown="confirmTransactionPayment('qris_transfer',this,event)" ontouchstart="confirmTransactionPayment('qris_transfer',this,event)" onclick="confirmTransactionPayment('qris_transfer',this,event)" class="btn btn-primary" style="min-height:56px;font-size:13px"><i class="fas fa-qrcode"></i> QRIS / Transfer</button>
      </div>
      <button onclick="closeTransactionPaymentModal()" class="btn btn-danger" style="width:100%;margin-top:10px;padding:12px;font-size:13px">Batal</button>
    </div>
  </div>

  <div id="page-content">
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center">
      <div style="background:#fff;border:1px solid #e3e9ed;border-radius:12px;padding:22px;max-width:360px;box-shadow:0 8px 24px rgba(0,0,0,.08)">
        <div class="loader-ring" style="margin:0 auto 14px"></div>
        <h1 style="font-size:18px;margin:0 0 6px;color:#263238">Memuat Rocky Hijab...</h1>
        <p style="font-size:12px;margin:0;color:#6f7a85;line-height:1.5">Kalau halaman tidak tampil setelah beberapa detik, pastikan file <b>style.css</b> dan <b>script.js</b> berada satu folder dengan <b>index.html</b>.</p>
      </div>
    </div>
  </div>

  <nav id="bottom-nav" style="display:none">
    <button onclick="router.navigate('home')" id="nav-home" class="nav-item"><i class="fas fa-house"></i><span id="nav-home-label">Beranda</span></button>
    <button onclick="router.navigate('history')" id="nav-history" class="nav-item"><i class="fas fa-receipt"></i><span id="nav-history-label">Transaksi</span></button>
    <button onclick="router.navigate('attendance')" id="nav-attendance" class="nav-item"><i class="fas fa-user-clock"></i><span id="nav-attendance-label">Absen</span></button>
    <button onclick="router.navigate('closing')" id="nav-closing" class="nav-item"><i class="fas fa-lock"></i><span id="nav-closing-label">Closing</span></button>
    <button onclick="router.navigate('report')" id="nav-report" class="nav-item"><i class="fas fa-chart-line"></i><span id="nav-report-label">Laporan</span></button>
    <button onclick="openNormalSettings()" id="nav-settings" class="nav-item"><i class="fas fa-gear"></i><span id="nav-settings-label">Pengaturan</span></button>
    <div class="admin-sidebar-sep" aria-hidden="true"></div>
    <button onclick="openAdminSidebarPanel('attendance')" id="nav-admin-attendance-performance" class="nav-item admin-side-extra"><i class="fas fa-user-check"></i><span>Performa Absen</span></button>
    <button onclick="openAdminSidebarPanel('manual_bonus')" id="nav-admin-manual-bonus" class="nav-item admin-side-extra"><i class="fas fa-hand-holding-dollar"></i><span>Bonus Manual</span></button>
    <button onclick="openAdminSidebarPanel('receipt_text')" id="nav-admin-receipt-text" class="nav-item admin-side-extra"><i class="fas fa-receipt"></i><span>Teks Struk</span></button>
    <button onclick="openAdminSidebarPanel('header_guide_note')" id="nav-admin-header-note" class="nav-item admin-side-extra"><i class="fas fa-pen-to-square"></i><span>Catatan Header</span></button>
    <button onclick="openAdminSidebarPanel('daily_employee')" id="nav-admin-daily-employee" class="nav-item admin-side-extra"><i class="fas fa-user-tag"></i><span>Bonus User</span></button>
    <button onclick="openAdminSidebarPanel('user_management')" id="nav-admin-user-management" class="nav-item admin-side-extra"><i class="fas fa-users-gear"></i><span>User</span></button>
    <button onclick="openAdminSidebarPanel('backup_restore')" id="nav-admin-backup-restore" class="nav-item admin-side-extra"><i class="fas fa-database"></i><span>Backup & Data</span></button>
    <button onclick="openAdminSidebarPanel('deleted_data')" id="nav-admin-deleted-data" class="nav-item admin-side-extra"><i class="fas fa-trash-can-arrow-up"></i><span>Recycle Bin</span></button>
    <button onclick="openAdminSidebarLogs()" id="nav-admin-logs" class="nav-item admin-side-extra"><i class="fas fa-clock-rotate-left"></i><span>Log Aktivitas</span></button>
  </nav>
  <div id="mobile-sidebar-overlay" onclick="closeMobileSidebar()" aria-hidden="true"></div>

  <button id="fab-pos" class="fab-add" onclick="openTransactionModal()" aria-label="Tambah transaksi">
    <i class="fas fa-plus"></i>
  </button>
</div>

<script>
  window.addEventListener('error', function(event){
    var page = document.getElementById('page-content');
    if (!page) return;
    var msg = String(event && (event.message || event.type) || 'Script gagal dimuat');
    if (msg && /ResizeObserver loop/i.test(msg)) return;
    setTimeout(function(){
      if (page && /Memuat Rocky Hijab/.test(page.innerHTML)) {
        page.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center"><div style="background:#fff;border:1px solid #ffd2d2;border-radius:12px;padding:22px;max-width:380px;box-shadow:0 8px 24px rgba(0,0,0,.08)"><h1 style="font-size:18px;margin:0 0 8px;color:#d84848">Aplikasi belum berhasil dimuat</h1><p style="font-size:12px;margin:0;color:#6f7a85;line-height:1.5">Cek lagi struktur upload GitHub: <b>index.html</b>, <b>style.css</b>, dan <b>script.js</b> harus sejajar di root repository. Detail error: '+ msg.replace(/[<>&]/g, function(c){ return ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]); }) +'</p></div></div>';
      }
    }, 800);
  }, true);
</script>

<script type="module" src="./script.js"></script>

</body>
</html>
