<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Rocky Hijab — Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Nunito+Sans:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    :root { --transition-theme: background .3s ease, color .3s ease, border-color .3s ease; }
    [data-theme="dark"]{
      --bg:#0a0d14; --bg2:#0f1420; --bg3:#141a2a; --surface:rgba(255,255,255,.04); --surface-hover:rgba(255,255,255,.07);
      --border:rgba(255,255,255,.08); --border-focus:rgba(99,155,255,.5); --text:#eef2ff; --text-soft:#7a85a0; --text-ghost:#3a4258;
      --accent:#5b8fff; --accent-dim:rgba(91,143,255,.15); --accent-glow:rgba(91,143,255,.25); --green:#52d89e; --green-dim:rgba(82,216,158,.12);
      --red:#ff6b6b; --red-dim:rgba(255,107,107,.12); --amber:#ffc46b; --amber-dim:rgba(255,196,107,.12); --nav-bg:rgba(10,13,20,.92); --shadow:0 8px 32px rgba(0,0,0,.5); --num-font:'Nunito Sans','Inter','Arial',sans-serif;
    }
    [data-theme="light"]{
      --bg:#f0f2f8; --bg2:#ffffff; --bg3:#f7f8fc; --surface:rgba(0,0,0,.03); --surface-hover:rgba(0,0,0,.055);
      --border:rgba(0,0,0,.07); --border-focus:rgba(64,120,240,.4); --text:#0f1523; --text-soft:#5c6478; --text-ghost:#aab0c0;
      --accent:#3b6df0; --accent-dim:rgba(59,109,240,.1); --accent-glow:rgba(59,109,240,.2); --green:#18a96b; --green-dim:rgba(24,169,107,.1);
      --red:#e84545; --red-dim:rgba(232,69,69,.1); --amber:#e8960a; --amber-dim:rgba(232,150,10,.1); --nav-bg:rgba(255,255,255,.92); --shadow:0 8px 32px rgba(0,0,0,.1); --num-font:'Nunito Sans','Inter','Arial',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:var(--transition-theme);-webkit-font-smoothing:antialiased}
    .stat-value,.stat-mini-num,.amount-display,.trx-amount,.trx-time{font-variant-numeric:tabular-nums lining-nums;font-feature-settings:'tnum' 1,'lnum' 1;}
    #app{max-width:430px;min-height:100vh;margin:0 auto;position:relative;background:var(--bg);overflow-x:hidden}
    [data-theme="dark"] #app::before{content:'';position:fixed;top:-120px;left:-80px;width:320px;height:320px;background:radial-gradient(circle, rgba(91,143,255,.09) 0%, transparent 70%);pointer-events:none;z-index:0}
    #page-content{position:relative;z-index:1;padding-bottom:96px}
    .page-pad{padding:0 18px}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;transition:background .15s,var(--transition-theme)}
    .page-title{font-size:24px;font-weight:800;letter-spacing:-.025em}
    .page-subtitle{font-size:12.5px;color:var(--text-soft);margin-top:2px}
    .label-xs{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-ghost);margin-bottom:10px}
    .g-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 15px;min-height:44px;line-height:1.45;font-size:14px;color:var(--text);outline:none;transition:border-color .18s,background .18s,var(--transition-theme)}
    .g-input:focus{border-color:var(--border-focus);background:var(--accent-dim)}
    .g-input::placeholder{color:var(--text-ghost)}
    .btn{border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;transition:all .14s ease;display:inline-flex;align-items:center;justify-content:center;gap:7px;letter-spacing:.01em}
    .btn:active{transform:scale(.97);opacity:.9}
    .btn:disabled{opacity:.45;pointer-events:none}
    .btn-primary{background:var(--accent);color:white;border-radius:12px;box-shadow:0 4px 18px var(--accent-glow)}
    .btn-glass{background:var(--surface);border:1px solid var(--border)!important;border-radius:12px;color:var(--text-soft)}
    .btn-danger{background:var(--red-dim);border:1px solid rgba(255,107,107,.2)!important;color:var(--red);border-radius:10px}
    .btn-success{background:linear-gradient(135deg, #16a34a, #15803d);color:white;border-radius:12px}
    .theme-toggle{width:38px;height:38px;background:var(--surface);border:1px solid var(--border);border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--text-soft);flex-shrink:0}
    .theme-btn{color:var(--amber);background:var(--amber-dim);border-color:rgba(255,196,107,.22)}
    .member-btn{color:var(--accent);background:var(--accent-dim);border-color:rgba(91,143,255,.22);text-decoration:none}
    .logout-btn{color:var(--red);background:var(--red-dim);border-color:rgba(255,107,107,.22)}
    .header-actions{display:flex;gap:8px;align-items:center}
    .stat-hero{background:linear-gradient(140deg, var(--bg3) 0%, var(--bg2) 100%);border:1px solid var(--border);border-radius:18px;padding:22px 20px;position:relative;overflow:hidden}
    [data-theme="dark"] .stat-hero{background:linear-gradient(140deg,#131d36 0%, #0d1526 100%);border-color:rgba(91,143,255,.15)}
    .stat-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:130px;height:130px;background:radial-gradient(circle, var(--accent-glow) 0%, transparent 65%);pointer-events:none}
    .stat-label{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
    .stat-value{font-family:var(--num-font);font-size:28px;font-weight:700;letter-spacing:-.03em;position:relative;z-index:1}
    .stat-sub{font-size:11.5px;color:var(--text-soft);margin-top:5px;position:relative;z-index:1}
    .stat-mini{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 14px;text-align:center}
    .stat-mini-num{font-family:var(--num-font);font-size:26px;font-weight:700;line-height:1.1}
    .stat-mini-lbl{font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-ghost);margin-bottom:5px}
    .bonus-card{border:1px solid rgba(255,196,107,.18);border-radius:16px;padding:18px 20px;position:relative;overflow:hidden}
    [data-theme="dark"] .bonus-card{background:#1a1800}[data-theme="light"] .bonus-card{background:#fffaf0}
    .bonus-card::before{content:'';position:absolute;top:-20px;right:-20px;width:90px;height:90px;background:radial-gradient(circle, rgba(255,196,107,.18) 0%, transparent 70%)}
    .modal-wrap{position:fixed;inset:0;background:rgba(5,8,16,.72);backdrop-filter:blur(14px);z-index:150;display:none;align-items:center;justify-content:center;padding:18px}
    .modal-wrap.show{display:flex}
    .modal-sheet{background:var(--bg2);border:1px solid var(--border);border-radius:24px;width:100%;max-width:392px;padding:16px 16px 18px;box-shadow:var(--shadow);animation:sheetPop .18s ease both}
    .modal-pill{width:36px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 20px}
    .modal-ico{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto 14px}
    .amount-display{font-family:var(--num-font);font-size:34px;font-weight:700;color:var(--accent);text-align:right;width:100%;background:none;border:none;outline:none}
    #bottom-nav{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:402px;background:var(--nav-bg);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:22px;display:flex;justify-content:space-around;align-items:center;height:62px;z-index:100;padding:0 6px;box-shadow:var(--shadow)}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 14px;border-radius:14px;cursor:pointer;background:none;border:none;color:var(--text-ghost);min-width:52px}
    .nav-item i{font-size:17px}.nav-item span{font-size:8.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
    .nav-item.active{background:var(--accent-dim);color:var(--accent)}
    #bottom-nav.staff-nav{justify-content:center;gap:16px;padding:0 12px}
    #bottom-nav.staff-nav .nav-item{flex:1;max-width:124px}
    .swipe-hint{display:flex;align-items:center;justify-content:center;gap:7px;margin:8px 0 0;font-size:10.5px;color:var(--text-ghost);font-weight:700}
    .fab-add{position:fixed;right:22px;bottom:86px;width:58px;height:58px;border-radius:20px;border:none;background:linear-gradient(135deg,var(--accent),#7aa5ff);color:white;display:none;align-items:center;justify-content:center;box-shadow:0 14px 32px var(--accent-glow);z-index:110;cursor:pointer;font-size:22px;transition:transform .16s ease, box-shadow .16s ease}.fab-add:active{transform:scale(.92) rotate(8deg)}.fab-add.staff-fab{bottom:100px;right:20px;width:62px;height:62px;border-radius:22px}
    #loading{position:fixed;inset:0;background:rgba(10,13,20,.7);backdrop-filter:blur(16px);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
    .loader-ring{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes sheetPop{from{opacity:.85;transform:translateY(14px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    #toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-8px) scale(.95);z-index:300;padding:10px 18px;border-radius:100px;font-size:12.5px;font-weight:600;opacity:0;transition:all .22s cubic-bezier(.34,1.5,.64,1);white-space:nowrap;max-width:calc(100% - 40px);text-align:center;pointer-events:none}
    #toast.show{transform:translateX(-50%) translateY(0) scale(1);opacity:1}
    .loc-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:100px;font-size:11.5px;font-weight:600}
    .loc-in{background:var(--green-dim);color:var(--green);border:1px solid rgba(82,216,158,.2)}
    .loc-out{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,107,107,.2)}
    .loc-loading{background:var(--surface);color:var(--text-ghost);border:1px solid var(--border)}
    .tab-group{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:3px;display:flex;gap:2px}
    .tab-btn{flex:1;padding:8px 4px;border-radius:9px;font-size:11px;font-weight:600;color:var(--text-ghost);background:none;border:none;cursor:pointer}
    .tab-btn.active{background:var(--accent);color:white}
    .trx-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:13px}
    .trx-icon{width:38px;height:38px;background:var(--accent-dim);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:var(--accent)}
    .trx-amount{font-family:var(--num-font);font-size:16px;font-weight:600}
    .trx-note{font-size:11.5px;color:var(--text-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:155px}
    .trx-time{font-family:var(--num-font);font-size:9px;color:var(--text-ghost);margin-top:3px}
    .setting-row{display:flex;align-items:center;gap:13px;padding:13px 15px;background:var(--bg2);border:1px solid var(--border);border-radius:13px;cursor:pointer;width:100%;font-family:'Inter',sans-serif}
    .setting-ico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
    .setting-label{font-size:13px;font-weight:500;color:var(--text);flex:1;text-align:left}
    .setting-arrow{color:var(--text-ghost);font-size:10px}
    .badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:100px;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
    .badge-blue{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(91,143,255,.2)}
    .status-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:100px;font-size:11px;font-weight:700;border:1px solid}
    .status-ok{background:var(--green-dim);color:var(--green);border-color:rgba(82,216,158,.2)}
    .status-warn{background:var(--red-dim);color:var(--red);border-color:rgba(255,107,107,.2)}
    .login-brand{width:78px;height:78px;border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;position:relative}
    [data-theme="dark"] .login-brand{background:linear-gradient(135deg,#1a2a50 0%,#0d1830 100%);border:1px solid rgba(212,175,55,.25)}
    [data-theme="light"] .login-brand{background:linear-gradient(135deg,#dde8ff 0%,#c5d8ff 100%);border:1px solid rgba(59,109,240,.2)}
    .sync-btn{padding:7px 12px;background:var(--accent-dim);border:1px solid rgba(91,143,255,.2);border-radius:10px;color:var(--accent);font-size:11.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
    .refresh-btn{color:var(--accent);background:var(--accent-dim);border-color:rgba(91,143,255,.22)}
    .refresh-btn.is-refreshing i{animation:spin .65s linear infinite}
    .user-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;background:var(--surface);border:1px solid var(--border);color:var(--text-soft)}
    .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    .page-in{animation:pageIn .22s ease both}.s1{animation-delay:.04s}.s2{animation-delay:.08s}.s3{animation-delay:.12s}.s4{animation-delay:.16s}
    @keyframes pageIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    /* === ADMIN COMPACT FULL 1 LAYAR === */
    .page-pad .card{border-radius:14px}

      .page-title{font-size:19px}
      .stat-hero{padding:16px 15px}

px;border-radius:18px;margin-bottom:14px}.user-chip{gap:4px;padding:3px 7px;font-size:9.5px}.loc-chip{gap:4px;padding:4px 8px;font-size:9.5px}.tab-group{border-radius:10px;padding:2px}.tab-btn{padding:7px 3px;border-radius:8px;font-size:10px}.swipe-hint{font-size:9px;margin-top:5px}.page-in{animation:none}

    /* === KASIR PINTAR STYLE UI OVERRIDE - TAMPILAN SAJA === */

      --kp-text:#2c333a;

      --transition-theme:background .12s ease,color .12s ease,border-color .12s ease;

      --amber:#e6a700;

  function askPin(message = 'Masukkan PIN:', title = 'Konfirmasi PIN') {
    return new Promise((resolve) => {
      const old = document.getElementById('pin-confirm-modal');
      if (old) old.remove();
      const safeText = String(message || 'Masukkan PIN:')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
      const safeTitle = String(title || 'Konfirmasi PIN')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      const wrap = document.createElement('div');
      wrap.id = 'pin-confirm-modal';
      wrap.className = 'modal-wrap show';
      wrap.style.zIndex = '900';
      wrap.style.alignItems = 'center';
      wrap.style.justifyContent = 'center';
      wrap.innerHTML = `
        <div class="modal-sheet" style="max-width:360px;border-radius:22px;padding:18px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
            <div style="width:38px;height:38px;border-radius:12px;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-key"></i></div>
            <div style="min-width:0">
              <h3 style="font-size:15px;font-weight:900;letter-spacing:-.02em">${safeTitle}</h3>
              <p style="font-size:10.5px;color:var(--text-soft);margin-top:2px">Keyboard angka otomatis di Android</p>
            </div>
          </div>
          <div style="font-size:12px;line-height:1.45;color:var(--text-soft);margin-bottom:11px">${safeText}</div>
          <input id="pin-confirm-input" type="tel" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" class="g-input" placeholder="Masukkan PIN" style="font-size:18px;letter-spacing:.12em;text-align:center;-webkit-text-security:disc" />
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:13px">
            <button id="pin-confirm-cancel" class="btn btn-glass" style="padding:11px;font-size:12px">Batal</button>
            <button id="pin-confirm-ok" class="btn btn-primary" style="padding:11px;font-size:12px">Lanjut</button>
          </div>
        </div>`;
      document.body.appendChild(wrap);
      const input = document.getElementById('pin-confirm-input');
      const close = (value) => { wrap.remove(); resolve(value); };
      document.getElementById('pin-confirm-cancel')?.addEventListener('click', () => close(null));
      document.getElementById('pin-confirm-ok')?.addEventListener('click', () => close(String(input?.value || '').trim()));
      wrap.addEventListener('click', (e) => { if (e.target === wrap) close(null); });
      input?.addEventListener('keydown', (e) => { if (e.key === 'Enter') close(String(input.value || '').trim()); if (e.key === 'Escape') close(null); });
      setTimeout(() => input?.focus(), 80);
    });
  }
